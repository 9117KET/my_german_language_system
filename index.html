<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f0f">
  <title>Deutsch Lernen</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Deutsch Lernen</h1>
  <span id="counter">0 / 0</span>
</header>

<div id="controls-bar">
  <select id="category-select"></select>
  <button class="toggle-btn" id="shuffle-btn">Shuffle</button>
  <button class="toggle-btn active" id="auto-btn">Auto: ON</button>
  <button class="toggle-btn" id="loop-btn">Loop</button>
</div>

<div id="mode-tabs">
  <div class="tab active" data-mode="listen">Listen</div>
  <div class="tab" data-mode="shadow">Shadow</div>
  <div class="tab" data-mode="recall">Recall</div>
  <div class="tab" data-mode="ai">AI</div>
  <div class="tab" data-mode="progress">Progress</div>
</div>

<div id="card-area">

  <div class="card" id="card">
    <div class="category-badge" id="category-badge"></div>
    <div id="srs-status-badge" style="display:none"></div>
    <div class="german" id="german-text"></div>
    <div class="english" id="english-text"></div>
    <div class="reveal-hint" id="reveal-hint"></div>
  </div>

  <div id="audio-bar">
    <button id="play-btn" aria-label="Play/Pause">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
    <div id="audio-info">
      <div class="phrase-num" id="phrase-num"></div>
      <div class="status-text" id="status-text">Ready</div>
      <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
    </div>
  </div>

  <div id="recall-srs-bar" style="display:none">
    <span id="recall-due-count"></span>
    <button class="toggle-btn" id="recall-autograde-toggle">Auto-grade: OFF</button>
  </div>

  <div id="recall-buttons">
    <button class="recall-btn got-it" id="got-it-btn">Got it (G)</button>
    <button class="recall-btn missed" id="missed-btn">Missed (M)</button>
  </div>

  <div id="recall-voice-area" style="display:none">
    <button id="recall-mic-btn" aria-label="Speak German">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
    <div id="recall-transcript"></div>
  </div>

  <div id="stats-bar" style="display:none">
    <div class="stat green"><div class="val" id="stat-got">0</div><div class="lbl">Got</div></div>
    <div class="stat yellow"><div class="val" id="stat-total">0</div><div class="lbl">Done</div></div>
    <div class="stat red"><div class="val" id="stat-missed">0</div><div class="lbl">Missed</div></div>
  </div>

  <div id="nav-buttons">
    <button class="nav-btn" id="prev-btn">&#8592; Prev</button>
    <button class="nav-btn" id="next-btn">Next &#8594;</button>
  </div>

  <div id="empty-state">
    <p>No phrases found.</p>
    <p style="margin-top:8px;font-size:0.85rem">Run <code>python scripts/generate_audio.py</code> first.</p>
  </div>

  <!-- AI Chat panel (shown when AI tab is active) -->
  <div id="ai-panel" style="display:none">

    <div id="ai-sub-tabs">
      <button class="ai-sub-btn active" data-aimode="translate">How do I say...</button>
      <button class="ai-sub-btn" data-aimode="correct">Correct my German</button>
    </div>

    <div id="ai-category-row">
      <span class="ai-label">Save to island:</span>
      <select id="ai-category-select"></select>
    </div>

    <div id="ai-mic-area">
      <button id="ai-mic-btn" aria-label="Tap to speak">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <div id="ai-lang-hint">Speak in English</div>
      <div id="ai-mic-status">Tap mic to start</div>
    </div>

    <div id="ai-fallback-row">
      <input id="ai-text-input" type="text" placeholder="Or type here and press Send">
      <button id="ai-send-btn">Send</button>
    </div>

    <div id="ai-result-card" style="display:none">
      <div id="ai-spinner" style="display:none">Thinking...</div>
      <div id="ai-result-body"></div>
      <div id="ai-result-actions">
        <button id="ai-replay-btn">&#9654; Replay</button>
        <button id="ai-save-btn">+ Save phrase</button>
      </div>
    </div>

    <div id="ai-saved-section">
      <div id="ai-saved-header">
        <span id="ai-saved-count">Saved: 0</span>
        <button id="ai-export-btn">Export JSON</button>
        <button id="ai-clear-btn">Clear</button>
      </div>
      <div id="ai-saved-list"></div>
    </div>

  </div>

  <!-- Progress panel (shown when Progress tab is active) -->
  <div id="progress-panel" style="display:none">

    <div id="progress-summary">
      <div class="prog-stat"><div class="prog-val" id="prog-due-val">0</div><div class="prog-lbl">Due</div></div>
      <div class="prog-stat"><div class="prog-val" id="prog-upcoming-val">0</div><div class="prog-lbl">Upcoming</div></div>
      <div class="prog-stat"><div class="prog-val" id="prog-mastered-val">0</div><div class="prog-lbl">Mastered</div></div>
      <div class="prog-stat"><div class="prog-val" id="prog-new-val">0</div><div class="prog-lbl">New</div></div>
    </div>

    <div id="progress-filters">
      <button class="prog-filter active" data-filter="due">Due Now</button>
      <button class="prog-filter" data-filter="upcoming">Upcoming</button>
      <button class="prog-filter" data-filter="mastered">Mastered</button>
      <button class="prog-filter" data-filter="archived">Archived</button>
      <button class="prog-filter" data-filter="all">All</button>
    </div>

    <div id="progress-list"></div>

  </div>

</div>

<!--
  data.js is generated by generate_audio.py / add_phrase.py.
  It defines the global PHRASES array.
  If the file is missing, phrases won't load - run generate_audio.py first.
-->
<script>
// Fallback if data.js hasn't been generated yet
if (typeof PHRASES === 'undefined') { window.PHRASES = []; }
</script>
<script src="data.js" onerror="window.PHRASES=[]"></script>
<script src="app.js"></script>

</body>
</html>
